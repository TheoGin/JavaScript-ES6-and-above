<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Title</title>
  </head>
  <body>
    <div style="display: flex">
      <img src="./img/liao.jpg" alt="">
      <button>转换</button>
      <!-- canvas 会有默认的宽和高是 300*150 -->
      <canvas style="width: 100px; height: 117px"></canvas>
    </div>
    <script>
      const button = document.querySelector("button");
      const canvas = document.querySelector("canvas");
      const img = document.querySelector("img");
      button.onclick = function () {
        console.log(canvas);
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0);

        const imageData = ctx.getImageData(0, 0, img.width, img.height);
        // console.log(imageData); // ImageData {data: Uint8ClampedArray(46800)[21, 19, 22, 255, 24, 22, 25, 255, 26, 25, 28, 255, ...], width: 100, height: 117, colorSpace: 'srgb', pixelFormat: 'rgba-unorm8'}
        const data = imageData.data;
        for (let i = 0; i < data.length; i += 4) {
          const red = data[i];
          const green = data[i + 1];
          const blue = data[i + 2];

          // 拿到三个平均数，即灰度值
          const average = (red + green + blue) / 3;
          data[i] = average;
          data[i + 1] = average;
          data[i + 2] = average;
        }
        console.log(data);
      };
    </script>
  </body>
</html>
