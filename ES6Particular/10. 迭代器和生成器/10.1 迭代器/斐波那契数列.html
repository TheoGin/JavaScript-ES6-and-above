<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Title</title>
  </head>
  <body>
    <script>
      // 要输出斐波拉契数列的前N位
      // 一个无限的斐波拉契数列 1 1 2 3 5 8 13 21
      const iterator = {
        // 也可以写成函数createFeiboIterator，然后返回一个对象，这样下面三个就可以定义成变量
        i: 0, // 当前取到斐波拉契的第几位了，从 0 开始
        prev1: 1,
        prev2: 1,
        next() {
          this.i++;
          if (this.i === 1 || this.i === 2) {
            return {
              value: 1,
              done: false, // 永远为 false
            };
          }
          const value = this.prev1 + this.prev2;
          this.prev1 = this.prev2;
          this.prev2 = value;

          return {
            value,
            done: false, // 永远为 false
          };
        },
      };

      for (let i = 0; i < 10; i++) {
        console.log(iterator.next().value);
      }
    </script>
  </body>
</html>
