<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Title</title>
  </head>
  <body>
    <script>
      // iterator是一个迭代器
      const iterator = {
        i: 1, // 当前的迭代次数
        total: 3, // 可迭代3次
        next() {
          const obj = { // 当前这一次迭代到的数据
            value: this.i > this.total ? undefined : this.i,
            done: this.i > this.total,
          };

          this.i++;

          return obj;
        },
      };
    </script>
  </body>
</html>
