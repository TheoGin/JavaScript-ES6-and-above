      // 创建一个用户迭代数组的迭代器
      function* iteratorCreator(arr) {
        for (const item of arr) {
          yield item;
        }
      }

      const arr = [1, 2, 3];

      const iterator = iteratorCreator(arr);
      let next = iterator.next();
      while (!next.done) {
        const item = next.value;
        console.log(item);
        next = iterator.next();
      }

      /*
       1
       2
       3
       *  */
    </script>
