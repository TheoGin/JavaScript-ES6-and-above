<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Title</title>
  </head>
  <body>
    <script>
      function* method() {
        console.log("第1次运行");
        yield 1;
        console.log("第2次运行");
        yield 2;
        console.log("第3次运行");
        return 10;
      }

      const generator = method();
      console.log(generator.next());
      console.log(generator.next());
      console.log(generator.next());
      console.log(generator.next());
      /*
       第1次运行
       {value: 1, done: false}
       第2次运行
       {value: 2, done: false}
       第3次运行
       {value: 10, done: true}
       {value: undefined, done: true}
      *  */
    </script>
  </body>
</html>
