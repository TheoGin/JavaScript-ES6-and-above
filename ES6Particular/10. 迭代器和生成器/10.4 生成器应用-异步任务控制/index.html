<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Title</title>
  </head>
  <body>
    <script>
      function* task() {
        const value1 = yield 1;
        console.log(value1);
        const value2 = yield new Promise(resolve => {
          setTimeout(() => {
            resolve(2);
          }, 1000);
        });
        console.log(value2);
      }

      run(task);

      function run(task) {
        const generator = task();
        let next = generator.next();
        handleNext();

        function handleNext() {
          if (next.done) {
            return;
          }
          if (typeof next.value.then === "function") {
            // Promise
            next.value.then(value => {
              next = generator.next(value);
              handleNext();
            });
          } else {
            next = generator.next(next.value);
            handleNext();
          }
        }
      }

    </script>
  </body>
</html>
